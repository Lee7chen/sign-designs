<!DOCTYPE html>
<html lang="zh-CN" data-document-role="page">
<head>
  <meta charset="UTF-8">
  <title>炙酌门头招牌 - 方案1 签名式连接</title>
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Noto+Sans+SC:wght@300&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      background: #000; 
      display: flex; 
      justify-content: center; 
      align-items: center; 
      min-height: 100vh;
      overflow: hidden;
    }
    .sign {
      width: 4200px; 
      height: 1000px;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }
    .main-group {
      display: flex;
      align-items: baseline;
      gap: 40px;
      position: relative;
    }
    .zh {
      font-family: 'Noto Sans SC', sans-serif;
      font-size: 480px;
      font-weight: 300;
      color: #fff;
      letter-spacing: 100px;
      line-height: 1;
    }
    .en {
      font-family: 'Great Vibes', cursive;
      font-size: 220px;
      color: #fff;
      transform: rotate(-4deg);
      margin-left: -20px;
      margin-bottom: -80px;
      align-self: flex-end;
    }
    .sub {
      font-family: 'Noto Sans SC', sans-serif;
      font-size: 68px;
      font-weight: 300;
      color: #888;
      letter-spacing: 36px;
      position: absolute;
      bottom: 140px;
      right: 280px;
    }
    .glow {
      text-shadow: 
        0 0 30px rgba(255,255,255,0.5),
        0 0 60px rgba(255,255,255,0.3),
        0 0 120px rgba(255,255,255,0.15),
        0 0 200px rgba(255,255,255,0.08);
    }
  </style>
</head>
<body data-document-role="page">
  <div class="sign" data-document-role="page">
    <div class="main-group" data-document-role="page">
      <div class="zh glow" data-document-role="page">炙酌</div>
      <div class="en glow" data-document-role="page">char · sip</div>
    </div>
    <div class="sub" data-document-role="page">烧烤 酒馆</div>
  </div>
</body>
</html>
